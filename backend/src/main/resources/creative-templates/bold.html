<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 1080px;
    height: 1080px;
    font-family: 'Arial', sans-serif;
    background: #111827;
    color: #fff;
    overflow: hidden;
  }
  .wrapper { position: relative; width: 100%; height: 100%; }
  .product-photo {
    position: absolute;
    top: 120px;
    left: 140px;
    width: 800px;
    height: 640px;
    object-fit: cover;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .badge {
    position: absolute;
    top: 60px;
    right: 60px;
    background: {{accentColor}};
    color: #111827;
    font-weight: 800;
    font-size: 34px;
    padding: 16px 28px;
    border-radius: 999px;
    transform: rotate(4deg);
  }
  .product-name {
    position: absolute;
    left: 140px;
    bottom: 220px;
    font-size: 56px;
    font-weight: 800;
    max-width: 800px;
  }
  .promo {
    position: absolute;
    left: 140px;
    bottom: 150px;
    font-size: 32px;
    color: {{accentColor}};
    font-weight: 700;
  }
  .price {
    position: absolute;
    left: 140px;
    bottom: 70px;
    font-size: 44px;
    font-weight: 800;
  }
</style>
</head>
<body>
  <div class="wrapper">
    <img class="product-photo" src="{{productImage}}" />
    <div class="badge">{{badgeText}}</div>
    <div class="product-name">{{productName}}</div>
    <div class="promo">{{promoText}}</div>
    <div class="price">{{price}}</div>
  </div>
</body>
</html>
