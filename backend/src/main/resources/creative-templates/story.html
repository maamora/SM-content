<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 1080px;
    height: 1920px;
    font-family: 'Arial', sans-serif;
    background: #111827;
    color: #fff;
    overflow: hidden;
  }
  .wrapper { position: relative; width: 100%; height: 100%; }
  .product-photo {
    position: absolute;
    top: 260px;
    left: 90px;
    width: 900px;
    height: 900px;
    object-fit: cover;
    border-radius: 32px;
    box-shadow: 0 24px 70px rgba(0,0,0,0.5);
  }
  .badge {
    position: absolute;
    top: 100px;
    right: 90px;
    background: {{accentColor}};
    color: #111827;
    font-weight: 800;
    font-size: 40px;
    padding: 20px 34px;
    border-radius: 999px;
    transform: rotate(4deg);
  }
  .product-name {
    position: absolute;
    left: 90px;
    top: 1220px;
    font-size: 64px;
    font-weight: 800;
    max-width: 900px;
  }
  .promo {
    position: absolute;
    left: 90px;
    top: 1340px;
    font-size: 38px;
    color: {{accentColor}};
    font-weight: 700;
  }
  .price {
    position: absolute;
    left: 90px;
    top: 1420px;
    font-size: 52px;
    font-weight: 800;
  }
</style>
</head>
<body>
  <div class="wrapper">
    <img class="product-photo" src="{{productImage}}" />
    <div class="badge">{{badgeText}}</div>
    <div class="product-name">{{productName}}</div>
    <div class="promo">{{promoText}}</div>
    <div class="price">{{price}}</div>
  </div>
</body>
</html>
