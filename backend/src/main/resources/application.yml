server:
  port: 8080

spring:
  application:
    name: studio-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:maamora_studio}
    username: ${DB_USERNAME:maamora}
    password: ${DB_PASSWORD:maamora}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-in-prod}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${FRONTEND_ORIGIN:http://localhost:3000}
  storage:
    local-path: ${STORAGE_LOCAL_PATH:./uploads}
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:http://localhost:8080/files}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-flash-latest}
    base-url: https://generativelanguage.googleapis.com/v1beta
