spring:
  application:
    name: maamora-studio

  datasource:
    # If using Supabase, just replace this entire url string with your Supabase Transaction URL
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:maamora_studio}
    username: ${DB_USERNAME:maamora}
    password: ${DB_PASSWORD:maamora}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Use update for dev, but validate for production
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY}
    model: ${ANTHROPIC_MODEL:claude-3-5-sonnet-20240620}
    base-url: https://api.anthropic.com/v1/messages
  
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    
  storage:
    local-path: ${STORAGE_LOCAL_PATH:./uploads}
    public-base-url: ${STORAGE_PUBLIC_BASE_URL:http://localhost:8080/files}
